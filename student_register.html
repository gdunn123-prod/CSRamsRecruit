<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RecruitCSRams - Student Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #ffffff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"],
        select {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border-radius: 4px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        .checkbox-group {
            margin-top: 8px;
        }
        .checkbox-group label {
            font-weight: normal;
            display: block;
        }
        .submit-btn {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background: #0066cc;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        .submit-btn:hover {
            background: #004c99;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Student Registration</h1>
    <form action="save_student.php" method="post">
        <label for="full_name">Full Name</label>
        <input type="text" id="full_name" name="full_name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>

        <label for="school">High School</label>
        <input type="text" id="school" name="school">

        <label for="grade">Grade Level</label>
        <select id="grade" name="grade">
            <option value="">Select grade</option>
            <option value="9">9th</option>
            <option value="10">10th</option>
            <option value="11">11th</option>
            <option value="12">12th</option>
            <option value="college">College / Transfer</option>
        </select>

        <label>Areas of Interest (select all that apply)</label>
        <div class="checkbox-group">
            <label><input type="checkbox" name="interests[]" value="Artificial Intelligence"> Artificial Intelligence</label>
            <label><input type="checkbox" name="interests[]" value="Cybersecurity"> Cybersecurity</label>
            <label><input type="checkbox" name="interests[]" value="Data Science"> Data Science</label>
            <label><input type="checkbox" name="interests[]" value="Software Engineering"> Software Engineering</label>
            <label><input type="checkbox" name="interests[]" value="Game Development"> Game Development</label>
            <label><input type="checkbox" name="interests[]" value="Robotics"> Robotics</label>
        </div>

        <label>Will you attend the Open House?</label>
        <div class="checkbox-group">
            <label><input type="radio" name="attending" value="Yes" required> Yes</label>
            <label><input type="radio" name="attending" value="No" required> No</label>
            <label><input type="radio" name="attending" value="Maybe" required> Maybe</label>
        </div>

        <button type="submit" class="submit-btn">Submit Registration</button>
    </form>
</div>
</body>
</html>
